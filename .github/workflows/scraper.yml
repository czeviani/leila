name: Leila Scraper

on:
  schedule:
    # Todo dia às 7h e 19h horário de Brasília (UTC-3 = 10h e 22h UTC)
    - cron: '0 10,22 * * *'
  workflow_dispatch:
    # Disparo manual via GitHub UI ou API

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: leila/scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r leila/scraper/requirements.txt

      - name: Run scraper
        working-directory: leila/scraper
        env:
          SUPABASE_URL: ${{ secrets.LEILA_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.LEILA_SUPABASE_SERVICE_KEY }}
          PROXY_ROTATION: 'false'
          SCRAPER_UFS: ${{ vars.LEILA_SCRAPER_UFS || 'SP,RJ,MG,PR,RS,SC,GO,DF,BA,CE,PE' }}
        run: python run.py
