services:
  leila-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: leila-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    networks:
      - leila-net
      - easypanel-zeke

  leila-scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: leila-scraper
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - scraper/.env
    networks:
      - leila-net

networks:
  leila-net:
    driver: bridge
  easypanel-zeke:
    external: true
